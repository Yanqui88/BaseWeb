services:
  db:
    image: postgres:16
    container_name: proyectoweb_db
    environment:
      POSTGRES_USER: proyectoweb
      POSTGRES_PASSWORD: proyectoweb
      POSTGRES_DB: proyectoweb
    ports:
      - "5432:5432"
    volumes:
      - proyectoweb_pg:/var/lib/postgresql/data

volumes:
  proyectoweb_pg: