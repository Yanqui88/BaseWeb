packages:
  - apps/*
  - packages/*

allowBuilds:
  '@nestjs/core': true
  '@prisma/engines': true
  bcrypt: true
  msgpackr-extract: true
  prisma: true
  sharp: true
  unrs-resolver: true

onlyBuiltDependencies:
  - '@nestjs/core'
  - '@prisma/engines'
  - bcrypt
  - prisma
  - sharp
  - unrs-resolver
  - msgpackr-extract
